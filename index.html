<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボウリング・スコアナビゲーターPro | リアルタイムスコア計算＆目標シミュレーション</title>
    <meta name="description" content="ボウリングのスコア計算から、目標達成に向けたリアルタイムシミュレーションまで！スコア表の画像シェアもできる無料のボウリング専用スコアナビゲーターアプリです。">
    <meta property="og:title" content="ボウリング・スコアナビゲーターPro">
    <meta property="og:description" content="目標スコア達成ルートを自動計算！ボウリングのスコア表を画像でシェアしよう。">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #007af4;
            --primary-light: #e8f2ff;
            --danger: #ff3b30;
            --success: #34c759;
            --warning: #ff9500;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --subtext: #666;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 12px;
            color: var(--text);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 1.15rem;
            margin: 0 0 12px;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        /* ===== カード ===== */
        .card {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            margin-bottom: 12px;
        }

        /* ===== ヘッダーエリア ===== */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .header-actions input {
            border: 1.5px solid var(--border);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            flex: 1;
            min-width: 0;
            transition: border-color 0.2s;
        }
        .header-actions input:focus { outline: none; border-color: var(--primary); }

        .btn {
            border: none;
            padding: 8px 11px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { opacity: 0.75; transform: scale(0.97); }
        .btn-share { background: var(--primary); color: white; }
        .btn-reset { background: #f2f2f7; color: var(--danger); border: 1.5px solid var(--danger); }

        /* ===== スコア概要 ===== */
        .score-summary {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .score-box {
            flex: 1;
            background: var(--bg-color);
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
        }
        .score-box label {
            font-size: 0.72rem;
            color: var(--subtext);
            display: block;
            margin-bottom: 3px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .score-big {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
            transition: color 0.4s;
        }
        .score-big.on-track { color: var(--success); }
        .score-big.at-risk { color: var(--warning); }
        .score-big.failed { color: var(--danger); }
        .score-big.default { color: var(--text); }

        .max-score-val { font-size: 1.5rem; font-weight: 700; color: var(--subtext); }

        /* 目標スコア選択 */
        .target-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .target-row label { font-size: 0.8rem; color: var(--subtext); font-weight: 600; white-space: nowrap; }
        .target-input {
            width: 70px;
            padding: 6px 8px;
            font-size: 1rem;
            text-align: center;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-weight: 700;
            transition: border-color 0.2s;
        }
        .target-input:focus { outline: none; border-color: var(--primary); }
        .preset-btns {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .preset-btn {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1.5px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: 600;
            color: var(--subtext);
            transition: all 0.15s;
        }
        .preset-btn:hover, .preset-btn.active-preset {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* ===== キャプチャエリア ===== */
        #captureArea {
            background: white;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid #eee;
        }
        #captureHeader {
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #333;
        }

        /* ===== スコアボード ===== */
        .score-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 5px;
        }
        .frame {
            border: 1.5px solid var(--border);
            border-radius: 8px;
            text-align: center;
            overflow: hidden;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
        }
        .frame.interactive { cursor: pointer; }
        .frame.interactive:active { background: #f5f5f7; transform: scale(0.97); }
        .frame.current-frame {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,122,244,0.25);
        }
        .frame.completed { background: #fafffe; }
        .frame-number {
            background: #e5e5ea;
            font-size: 0.7rem;
            padding: 2px 0;
            font-weight: 700;
            color: #555;
        }
        .frame.current-frame .frame-number {
            background: var(--primary);
            color: white;
        }
        .shots {
            display: flex;
            border-bottom: 1px solid #eee;
            height: 24px;
            line-height: 24px;
            font-size: 0.88rem;
        }
        .shot { flex: 1; min-height: 24px; }
        .shot:not(:last-child) { border-right: 1px solid #eee; }
        .frame-total {
            height: 28px;
            line-height: 28px;
            font-weight: 700;
            font-size: 0.95rem;
            background: #fafafa;
        }
        .strike-mark { color: var(--danger); font-weight: 800; }
        .spare-mark { color: var(--primary); font-weight: 800; }

        /* ===== シミュレーション ===== */
        .sim-section { margin-top: 14px; padding-top: 14px; border-top: 2px dashed #ddd; }
        .sim-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--subtext);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sim-badge {
            font-size: 0.68rem;
            background: var(--warning);
            color: white;
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 700;
        }
        .sim-board .frame { background: #fdfbf7; border-color: #e6e4d9; opacity: 0.9; }
        .sim-board .frame-number { background: #f4ecce; color: #8a7b45; }
        .sim-board .frame-total { background: #fcfbfa; color: #666; }
        .sim-hint {
            margin-top: 8px;
            font-size: 0.78rem;
            color: var(--subtext);
            text-align: center;
            line-height: 1.4;
        }

        /* ===== メッセージ ===== */
        .message-area {
            background: var(--primary-light);
            border-left: 4px solid var(--primary);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 12px;
            transition: background 0.4s, border-color 0.4s;
        }

        /* ===== 履歴 ===== */
        .history-section { margin-top: 5px; }
        .history-header {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--subtext);
            margin-bottom: 8px;
        }
        .history-list { display: flex; flex-direction: column; gap: 6px; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .history-score { font-weight: 700; font-size: 1.05rem; }
        .history-score.high { color: var(--success); }
        .history-score.mid { color: var(--warning); }
        .history-score.low { color: var(--subtext); }
        .history-meta { color: var(--subtext); font-size: 0.75rem; }
        .history-empty { color: var(--subtext); font-size: 0.82rem; text-align: center; padding: 12px 0; }

        /* ===== 分析 ===== */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .analytics-item {
            background: var(--bg-color);
            border-radius: 10px;
            padding: 10px 8px;
            text-align: center;
        }
        .analytics-val {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
        }
        .analytics-label {
            font-size: 0.68rem;
            color: var(--subtext);
            font-weight: 600;
            margin-top: 2px;
        }
        .analytics-avg {
            margin-top: 10px;
            background: var(--primary-light);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .analytics-avg label { font-size: 0.78rem; color: var(--primary); font-weight: 700; }
        .analytics-avg span { font-size: 1.1rem; font-weight: 800; color: var(--primary); }

        /* ===== アド ===== */
        .ad-space { margin-top: 16px; text-align: center; border-top: 1px dashed #ccc; padding-top: 14px; }
        .ad-label { font-size: 0.72rem; color: #999; margin-bottom: 8px; }
        .ad-placeholder { background: #f8f9fa; padding: 18px; border-radius: 8px; color: #bbb; font-size: 0.85rem; border: 1px solid #eee; }

        /* ===== モーダル（入力） ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 20px 16px 28px;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-handle {
            width: 36px; height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 0 auto 14px;
        }
        .modal-title { font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 3px; }
        .modal-subtitle { font-size: 0.8rem; color: var(--subtext); text-align: center; margin-bottom: 14px; }
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .input-btn {
            background: #f2f2f7;
            border: none;
            padding: 14px 0;
            font-size: 1.15rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.1s, transform 0.1s;
        }
        .input-btn:active { background: #ddd; transform: scale(0.95); }
        .btn-strike { grid-column: span 3; background: var(--danger); color: white; font-size: 1.3rem; }
        .btn-spare { grid-column: span 3; background: var(--primary); color: white; font-size: 1.3rem; }
        .btn-gutter { background: #8e8e93; color: white; }
        .cancel-btn { grid-column: span 3; background: #f2f2f7; color: #555; font-size: 0.95rem; padding: 11px 0; margin-top: 4px; }
        .delete-btn { grid-column: span 3; background: var(--warning); color: white; font-size: 0.95rem; padding: 11px 0; margin-bottom: 2px; }

        /* ===== 確認モーダル ===== */
        .confirm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .confirm-box {
            background: white;
            border-radius: 16px;
            padding: 24px 20px 18px;
            width: 85%;
            max-width: 300px;
            text-align: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        .confirm-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
        .confirm-body { font-size: 0.85rem; color: var(--subtext); margin-bottom: 18px; line-height: 1.5; }
        .confirm-btns { display: flex; gap: 8px; }
        .confirm-btns button {
            flex: 1;
            padding: 11px 0;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .confirm-cancel { background: #f2f2f7; color: #333; }
        .confirm-ok { background: var(--danger); color: white; }

        /* ===== お祝いアニメーション ===== */
        .celebration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 300;
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .strike-flash {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            pointer-events: none;
            z-index: 301;
            animation: burstAway 0.7s ease forwards;
        }
        @keyframes burstAway {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
        }

        /* ===== ページ遷移タブ ===== */
        .tabs {
            display: flex;
            gap: 0;
            background: #e5e5ea;
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 7px 0;
            border: none;
            background: transparent;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--subtext);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: white;
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body>

<h1>🎳 ボウリング・ナビゲーターPro</h1>

<!-- 設定カード -->
<div class="card">
    <div class="header-actions">
        <input type="text" id="playerName" placeholder="ペンネーム" oninput="updateName()">
        <button class="btn btn-share" id="shareBtn" onclick="shareScore()">シェア📤</button>
        <button class="btn btn-reset" onclick="confirmReset()">リセット</button>
    </div>

    <!-- 現在スコア＋最大点 -->
    <div class="score-summary">
        <div class="score-box">
            <label>現在スコア</label>
            <div class="score-big default" id="currentScoreDisplay">—</div>
        </div>
        <div class="score-box">
            <label>最大可能点</label>
            <div class="max-score-val" id="maxPossibleScore">300</div>
        </div>
        <div class="score-box">
            <label>目標まで</label>
            <div class="score-big default" id="scoreGapDisplay">—</div>
        </div>
    </div>

    <!-- 目標スコア -->
    <div class="target-row">
        <label>目標</label>
        <input type="number" class="target-input" id="targetScore" value="180" min="0" max="300" oninput="saveData(); calculateScore()">
        <div class="preset-btns">
            <button class="preset-btn" onclick="setPreset(150)">初心者<br>150</button>
            <button class="preset-btn" onclick="setPreset(180)">中級者<br>180</button>
            <button class="preset-btn" onclick="setPreset(200)">上級者<br>200</button>
            <button class="preset-btn" onclick="setPreset(300)">パーフェクト<br>300</button>
        </div>
    </div>
</div>

<!-- タブ -->
<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('game')">🎳 スコア入力</button>
    <button class="tab-btn" onclick="switchTab('history')">📋 履歴</button>
    <button class="tab-btn" onclick="switchTab('analytics')">📊 分析</button>
</div>

<!-- ゲームタブ -->
<div class="tab-panel active" id="tab-game">
    <div id="captureArea" class="card">
        <div id="captureHeader">🎳 匿名ボウラーさんのスコア</div>
        <div id="mainBoardContainer"></div>
        <div class="message-area" id="messageArea">
            💡 1フレーム目をタップして、スコア入力を始めましょう！
        </div>
        <div class="sim-section">
            <div class="sim-title">
                🎯 目標達成シミュレーション
                <span class="sim-badge" id="simBadge">予測</span>
            </div>
            <div id="simBoardContainer"></div>
            <div class="sim-hint" id="simHint">残りフレームでこの結果を出せば目標達成できます</div>
        </div>
    </div>
</div>

<!-- 履歴タブ -->
<div class="tab-panel" id="tab-history">
    <div class="card">
        <div class="history-header">🕐 過去のゲーム履歴</div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<!-- 分析タブ -->
<div class="tab-panel" id="tab-analytics">
    <div class="card">
        <div class="history-header">📊 現在のゲーム分析</div>
        <div class="analytics-grid" id="analyticsGrid">
            <div class="analytics-item">
                <div class="analytics-val" id="strikeCount">—</div>
                <div class="analytics-label">ストライク数</div>
            </div>
            <div class="analytics-item">
                <div class="analytics-val" id="spareCount">—</div>
                <div class="analytics-label">スペア数</div>
            </div>
            <div class="analytics-item">
                <div class="analytics-val" id="gutterCount">—</div>
                <div class="analytics-label">ガター数</div>
            </div>
        </div>
        <div class="analytics-avg" id="strikeRateBox" style="margin-top:10px;">
            <label>ストライク率</label>
            <span id="strikeRate">—</span>
        </div>
        <div class="analytics-avg" style="margin-top:6px;">
            <label>スペア率</label>
            <span id="spareRate">—</span>
        </div>
    </div>
    <div class="card">
        <div class="history-header">📈 過去ゲーム平均スコア</div>
        <div class="analytics-avg">
            <label>平均スコア</label>
            <span id="avgScore">—</span>
        </div>
        <div style="margin-top:8px;" id="historyMiniList"></div>
    </div>
</div>

<div class="ad-space">
    <div class="ad-label">スポンサーリンク</div>
    <div class="ad-placeholder">ここにアフィリエイト広告が表示されます</div>
</div>

<!-- 入力モーダル（ボトムシート） -->
<div class="modal-overlay" id="inputModal" onclick="handleOverlayClick(event)">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modalTitle">フレームの入力</div>
        <div class="modal-subtitle" id="modalSubtitle">結果を選んでください</div>
        <div class="button-grid" id="buttonGrid"></div>
    </div>
</div>

<!-- 確認モーダル -->
<div class="confirm-overlay" id="confirmModal">
    <div class="confirm-box">
        <div class="confirm-title">リセットしますか？</div>
        <div class="confirm-body">現在のスコアがすべて消去されます。<br>（リセット前のスコアは履歴に保存されます）</div>
        <div class="confirm-btns">
            <button class="confirm-cancel" onclick="closeConfirm()">キャンセル</button>
            <button class="confirm-ok" onclick="executeReset()">リセット</button>
        </div>
    </div>
</div>

<script>
    // ===== データ =====
    let gameData = JSON.parse(localStorage.getItem('bowlingData') || 'null') || Array.from({length:11}, ()=>[null,null,null]);
    let currentFrame = null;
    let currentShotIdx = null;
    let autoAdvance = true;

    window.onload = () => {
        document.getElementById('mainBoardContainer').innerHTML = generateBoardHTML('', true);
        document.getElementById('simBoardContainer').innerHTML = generateBoardHTML('sim_', false, 'sim-board');

        const savedName = localStorage.getItem('playerName');
        if (savedName) document.getElementById('playerName').value = savedName;
        const savedTarget = localStorage.getItem('targetScore');
        if (savedTarget) document.getElementById('targetScore').value = savedTarget;

        updateName();
        calculateScore();
        renderHistory();
        updateAnalytics();
        updatePresetHighlight();
    };

    // ===== タブ =====
    function switchTab(name) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        event.target.classList.add('active');
        if (name === 'analytics') updateAnalytics();
    }

    // ===== プリセット =====
    function setPreset(val) {
        document.getElementById('targetScore').value = val;
        saveData();
        calculateScore();
        updatePresetHighlight();
    }
    function updatePresetHighlight() {
        const val = parseInt(document.getElementById('targetScore').value);
        document.querySelectorAll('.preset-btn').forEach(b => {

    // ===== ボード生成 =====
    function generateBoardHTML(prefix, isInteractive, extraClass = '') {
        let html = `<div class="score-board ${extraClass}">`;
        for (let i = 1; i <= 5; i++) {
            let cl = isInteractive ? 'frame interactive' : 'frame';
            let ev = isInteractive ? `onclick="openInputModal(${i})"` : '';
            html += `<div class="${cl}" id="${prefix}frame${i}" ${ev}>
                <div class="frame-number">${i}</div>
                <div class="shots"><div class="shot" id="${prefix}s${i}-1"></div><div class="shot" id="${prefix}s${i}-2"></div></div>
                <div class="frame-total" id="${prefix}t${i}"></div></div>`;
        }
        html += `</div><div class="score-board ${extraClass}">`;
        for (let i = 6; i <= 10; i++) {
            let cl = isInteractive ? 'frame interactive' : 'frame';
            let ev = isInteractive ? `onclick="openInputModal(${i})"` : '';
            let t3 = i === 10 ? `<div class="shot" id="${prefix}s10-3"></div>` : '';
            html += `<div class="${cl}" id="${prefix}frame${i}" ${ev}>
                <div class="frame-number">${i}</div>
                <div class="shots"><div class="shot" id="${prefix}s${i}-1"></div><div class="shot" id="${prefix}s${i}-2"></div>${t3}</div>
                <div class="frame-total" id="${prefix}t${i}"></div></div>`;
        }
        html += `</div>`;

    // ===== データ保存 =====
    function saveData() {
        localStorage.setItem('bowlingData', JSON.stringify(gameData));
        localStorage.setItem('playerName', document.getElementById('playerName').value);
        localStorage.setItem('targetScore', document.getElementById('targetScore').value);

    // ===== リセット =====
    function confirmReset() {
        document.getElementById('confirmModal').style.display = 'flex';
    }
    function closeConfirm() {
        document.getElementById('confirmModal').style.display = 'none';
    }
    function executeReset() {
        closeConfirm();
        // 履歴に保存（スコアが存在する場合のみ）
        const result = computeScoreLogic(gameData);
        const finalScore = result.display.slice().reverse().find(t => t !== '');
        if (finalScore) {
            saveToHistory(finalScore);
        }
        gameData = Array.from({length:11}, ()=>[null,null,null]);
        saveData();
        calculateScore();
        renderHistory();
    }

    // ===== 履歴管理 =====
    function saveToHistory(score) {
        const history = JSON.parse(localStorage.getItem('gameHistory') || '[]');
        history.unshift({
            score,
            date: new Date().toLocaleDateString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}),
            name: document.getElementById('playerName').value || '匿名'
        });
        if (history.length > 20) history.pop();
        localStorage.setItem('gameHistory', JSON.stringify(history));
    }
    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('gameHistory') || '[]');
        const list = document.getElementById('historyList');
        if (!history.length) {
            list.innerHTML = '<div class="history-empty">まだ履歴がありません。<br>ゲーム終了後リセットすると保存されます。</div>';
            return;
        }
        list.innerHTML = history.map((h, i) => {
            let cls = h.score >= 200 ? 'high' : h.score >= 150 ? 'mid' : 'low';
            return `<div class="history-item">
                <span class="history-meta">#${i+1} ${h.date}</span>
                <span class="history-score ${cls}">${h.score}点</span>
            </div>`;
        }).join('');

        // 分析用ミニリスト
        const mini = document.getElementById('historyMiniList');
        if (mini) {
            const avg = Math.round(history.reduce((s,h)=>s+h.score,0)/history.length);
            document.getElementById('avgScore').textContent = avg + '点';
        }
    }

    // ===== 分析 =====
    function updateAnalytics() {
        let strikes = 0, spares = 0, gutters = 0, totalShots = 0;
        for (let f = 1; f <= 9; f++) {
            const s1 = gameData[f][0], s2 = gameData[f][1];
            if (s1 === null) continue;
            totalShots++;
            if (s1 === 10) { strikes++; continue; }
            if (s1 === 0) gutters++;
            if (s2 !== null) {
                totalShots++;
                if (s1 + s2 === 10) spares++;
                else if (s2 === 0) gutters++;
            }
        }
        // 10フレーム
        [gameData[10][0], gameData[10][1], gameData[10][2]].forEach(s => {
            if (s !== null) { totalShots++; if (s === 10) strikes++; else if (s === 0) gutters++; }
        });

        document.getElementById('strikeCount').textContent = strikes || '—';
        document.getElementById('spareCount').textContent = spares || '—';
        document.getElementById('gutterCount').textContent = gutters || '—';
        document.getElementById('strikeRate').textContent = totalShots > 0 ? Math.round(strikes/Math.max(totalShots,1)*100) + '%' : '—';
        document.getElementById('spareRate').textContent = totalShots > 0 ? Math.round(spares/Math.max(totalShots,1)*100) + '%' : '—';
        renderHistory();
    }

    // ===== スコア計算 =====
    function computeScoreLogic(data) {
        let totalScore = 0;
        let displayTotals = Array(11).fill("");
        let rolls = [];
        for (let f = 1; f <= 9; f++) {
            if (data[f][0] === 10) rolls.push({pins:10});
            else {
                if (data[f][0] !== null) rolls.push({pins:data[f][0]});
                if (data[f][1] !== null) rolls.push({pins:data[f][1]});
            }
        }
        if (data[10][0] !== null) rolls.push({pins:data[10][0]});
        if (data[10][1] !== null) rolls.push({pins:data[10][1]});
        if (data[10][2] !== null) rolls.push({pins:data[10][2]});

        let rollIdx = 0;
        for (let f = 1; f <= 9; f++) {
            if (data[f][0] === null) break;
            if (data[f][0] === 10) {
                if (rolls[rollIdx+1] && rolls[rollIdx+2]) {
                    totalScore += 10 + rolls[rollIdx+1].pins + rolls[rollIdx+2].pins;
                    displayTotals[f] = totalScore;
                }
                rollIdx += 1;
            } else {
                if (data[f][1] === null) break;
                if (data[f][0] + data[f][1] === 10) {
                    if (rolls[rollIdx+2]) { totalScore += 10 + rolls[rollIdx+2].pins; displayTotals[f] = totalScore; }
                } else {
                    totalScore += data[f][0] + data[f][1];
                    displayTotals[f] = totalScore;
                }
                rollIdx += 2;
            }
        }
        if (data[10][0] !== null && data[10][1] !== null) {
            let f10 = data[10][0] + data[10][1];
            if (data[10][0] === 10 || f10 === 10) {
                if (data[10][2] !== null) { totalScore += f10 + data[10][2]; displayTotals[10] = totalScore; }
            } else {
                totalScore += f10; displayTotals[10] = totalScore;
            }
        }
        return {total:totalScore, display:displayTotals};
    }

    // ===== ボードUI描画 =====
    function renderBoardUI(data, scoreData, prefix) {
        for (let f = 1; f <= 10; f++) {
            document.getElementById(`${prefix}t${f}`).innerText = scoreData.display[f];
            if (f < 10) {
                let s1 = data[f][0], s2 = data[f][1];
                document.getElementById(`${prefix}s${f}-1`).innerHTML = s1===10?`<span class="strike-mark">X</span>`:(s1===0?'G':(s1!==null?s1:''));
                document.getElementById(`${prefix}s${f}-2`).innerHTML = s1===10?'':(s1!==null&&s2!==null&&s1+s2===10?`<span class="spare-mark">/</span>`:(s2===0?'-':(s2!==null?s2:'')));
            } else {
                let s1=data[10][0], s2=data[10][1], s3=data[10][2];
                document.getElementById(`${prefix}s10-1`).innerHTML = s1===10?`<span class="strike-mark">X</span>`:(s1===0?'G':(s1!==null?s1:''));
                if (s1===10) document.getElementById(`${prefix}s10-2`).innerHTML = s2===10?`<span class="strike-mark">X</span>`:(s2===0?'G':(s2!==null?s2:''));
                else document.getElementById(`${prefix}s10-2`).innerHTML = s1!==null&&s2!==null&&s1+s2===10?`<span class="spare-mark">/</span>`:(s2===0?'-':(s2!==null?s2:''));
                if (s1===10||(s1!==null&&s2!==null&&s1+s2===10)) {
                    if (s1===10&&s2===10) document.getElementById(`${prefix}s10-3`).innerHTML=s3===10?`<span class="strike-mark">X</span>`:(s3===0?'G':(s3!==null?s3:''));
                    else if (s1===10&&s2!==10) document.getElementById(`${prefix}s10-3`).innerHTML=s2!==null&&s3!==null&&s2+s3===10?`<span class="spare-mark">/</span>`:(s3===0?'-':(s3!==null?s3:''));
                    else document.getElementById(`${prefix}s10-3`).innerHTML=s3===10?`<span class="strike-mark">X</span>`:(s3===0?'G':(s3!==null?s3:''));
                } else {
                    const el = document.getElementById(`${prefix}s10-3`);
                    if (el) el.innerText='';
                }
            }
        }
    }

    // ===== 現在フレームのハイライト =====
    function updateFrameHighlight() {
        for (let f = 1; f <= 10; f++) {
            const el = document.getElementById(`frame${f}`);
            if (!el) continue;
            el.classList.remove('current-frame', 'completed');
        }
        // 入力待ちフレームを特定
        let nextFrame = null;
        for (let f = 1; f <= 9; f++) {
            if (gameData[f][0] === null) { nextFrame = f; break; }
            if (gameData[f][0] !== 10 && gameData[f][1] === null) { nextFrame = f; break; }
        }
        if (nextFrame === null) {
            if (gameData[10][0] === null) nextFrame = 10;
            else if (gameData[10][1] === null) nextFrame = 10;
            else if (gameData[10][2] === null && (gameData[10][0]===10||gameData[10][0]+gameData[10][1]===10)) nextFrame = 10;
        }
        if (nextFrame) document.getElementById(`frame${nextFrame}`)?.classList.add('current-frame');
        // 完了フレームをマーク
        for (let f = 1; f <= 10; f++) {
            if (f === nextFrame) continue;
            if (f < 10 && (gameData[f][0]===10 || gameData[f][1]!==null)) {
                document.getElementById(`frame${f}`)?.classList.add('completed');
            }
        }
    }

    // ===== メインスコア計算 =====
    function calculateScore() {
        const target = parseInt(document.getElementById('targetScore').value) || 0;
        const currentResult = computeScoreLogic(gameData);
        renderBoardUI(gameData, currentResult, '');
        updateFrameHighlight();
        updatePresetHighlight();

        // 現在スコア表示
        const lastScore = currentResult.display.slice().reverse().find(t => t !== '') || null;
        const scoreDisp = document.getElementById('currentScoreDisplay');
        const gapDisp = document.getElementById('scoreGapDisplay');
        if (lastScore !== null) {
            scoreDisp.textContent = lastScore;
            const gap = target - lastScore;
            if (gap <= 0) {
                scoreDisp.className = 'score-big on-track';
                gapDisp.textContent = '達成！';
                gapDisp.className = 'score-big on-track';
            } else {
                scoreDisp.className = 'score-big default';
                gapDisp.textContent = '+' + gap;
                gapDisp.className = 'score-big at-risk';
            }
        } else {
            scoreDisp.textContent = '—';
            gapDisp.textContent = '—';
            scoreDisp.className = 'score-big default';
            gapDisp.className = 'score-big default';
        }

        // 最大可能点
        let maxData = JSON.parse(JSON.stringify(gameData));
        for (let i=1;i<=10;i++) {
            if (maxData[i][0]===null) { maxData[i]=i<10?[10,0,null]:[10,10,10]; }
            else if (i===10) {
                if(maxData[10][1]===null) maxData[10]=[10,10,10];
                else if(maxData[10][2]===null&&(maxData[10][0]===10||maxData[10][0]+maxData[10][1]===10)) maxData[10][2]=10;
            }
        }
        let maxResult = computeScoreLogic(maxData);
        let currentMax = maxResult.display.slice().reverse().find(t=>t!=='')||0;
        document.getElementById('maxPossibleScore').innerText = currentMax;

        // シミュレーション
        let simData = JSON.parse(JSON.stringify(gameData));
        let emptyFrames = [];
        for (let i=1;i<=10;i++) {
            if (simData[i][0]===null) {
                emptyFrames.push(i);
                simData[i]=i<10?[9,1,null]:[9,1,9];
            }
        }
        if (emptyFrames.length>0) {
            if (currentMax<=target) {
                simData=maxData;
                document.getElementById('simBadge').textContent='全力';
                document.getElementById('simHint').textContent='目標達成には全フレームストライクが必要です';
            } else {
                let getSim=()=>computeScoreLogic(simData).display.slice().reverse().find(t=>t!=='')||0;
                let simScore=getSim();
                if (simScore<target) {
                    for (let i=emptyFrames.length-1;i>=0;i--) {
                        let f=emptyFrames[i];
                        simData[f]=f<10?[10,0,null]:[10,10,10];
                        if(getSim()>=target) break;
                    }
                }
                let loopCount=0;
                while (getSim()>target&&loopCount<20) {
                    loopCount++;
                    let changed=false;
                    for (let f of emptyFrames) {
                        let orig=JSON.parse(JSON.stringify(simData[f]));
                        if(f<10){if(simData[f][0]===10)simData[f]=[9,1,null];else if(simData[f][1]===1)simData[f]=[9,0,null];else if(simData[f][0]>0)simData[f]=[simData[f][0]-1,0,null];}
                        else{if(simData[10][0]===10)simData[10]=[9,1,9];else if(simData[10][1]===1)simData[10]=[9,0,null];}
                        if(getSim()<target){simData[f]=orig;}else{changed=true;break;}
                    }
                    if(!changed)break;
                }
                document.getElementById('simBadge').textContent='予測';
                document.getElementById('simHint').textContent='残りフレームでこの結果を出せば目標達成できます';
            }
        } else {
            document.getElementById('simHint').textContent='ゲーム終了';
        }
        let simResult = computeScoreLogic(simData);
        renderBoardUI(simData, simResult, 'sim_');

        // メッセージ
        const messageArea = document.getElementById('messageArea');
        let completedFrame = 0;
        for (let f=10;f>=1;f--) {
            if (currentResult.display[f]!==''){completedFrame=f;break;}
        }
        if (completedFrame===0) {
            messageArea.innerHTML='💡 1フレーム目をタップして入力を開始！';
            messageArea.style.cssText='border-left-color:var(--primary);background:var(--primary-light)';
        } else if (completedFrame===10) {
            const fs=currentResult.display[10];
            if (fs>=target) {
                messageArea.innerHTML=`🎉 <b>${fs}点！</b> 目標達成おめでとうございます！`;
                messageArea.style.cssText='border-left-color:var(--success);background:#e8f5e9';
            } else {
                messageArea.innerHTML=`🏁 ゲーム終了。目標まであと <b>${target-fs}点</b> でした！`;
                messageArea.style.cssText='border-left-color:var(--warning);background:#fff3e0';
            }
        } else {
            const cs=currentResult.display[completedFrame];
            const needed=target-cs;
            if (currentMax<target) {
                messageArea.innerHTML=`⚠️ 目標達成は難しい状況です。最高スコア<b>${currentMax}点</b>を目指しましょう！`;
                messageArea.style.cssText='border-left-color:var(--danger);background:#ffebee';
            } else {
                messageArea.innerHTML=`🔥 ${completedFrame}F終了。目標まであと <b>${needed}点</b>！シミュレーションのルートを参考に！`;
                messageArea.style.cssText='border-left-color:var(--primary);background:var(--primary-light)';
            }
        }
        updateAnalytics();
    }

    // ===== 入力モーダル =====
    function handleOverlayClick(e) {
        if (e.target === document.getElementById('inputModal')) closeModal();
    }

    function openInputModal(frameNum) {
        currentFrame = frameNum;
        if (frameNum<10) {
            if(gameData[frameNum][0]===null||gameData[frameNum][0]===10||gameData[frameNum][1]!==null) currentShotIdx=0;
            else currentShotIdx=1;
        } else {
            if(gameData[10][0]===null) currentShotIdx=0;
            else if(gameData[10][1]===null) currentShotIdx=1;
            else if(gameData[10][2]===null&&(gameData[10][0]===10||gameData[10][0]+gameData[10][1]===10)) currentShotIdx=2;
            else currentShotIdx=0;
        }
        renderModalButtons();
        document.getElementById('inputModal').style.display='flex';
    }

    function closeModal() { document.getElementById('inputModal').style.display='none'; }

            } else {
                subtitle.innerText='2投目の結果を選んでください';
                const first=gameData[currentFrame][0]||0;
                grid.innerHTML+=`<button class="input-btn btn-spare" onclick="executeInput('spare')">SPARE /</button>`;
                grid.innerHTML+=`<button class="input-btn btn-gutter" onclick="executeInput(0)">— (0本)</button>`;
                for(let i=10-first-1;i>=1;i--) grid.innerHTML+=`<button class="input-btn" onclick="executeInput(${i})">${i}</button>`;
            }
        } else {
            subtitle.innerText='投球結果を選んでください';
            let first=gameData[10][0],second=gameData[10][1];
            if (currentShotIdx===0) {
                grid.innerHTML+=`<button class="input-btn btn-strike" onclick="executeInput(10)">STRIKE ✕</button>`;
                grid.innerHTML+=`<button class="input-btn btn-gutter" onclick="executeInput(0)">ガター G</button>`;
                for(let i=9;i>=1;i--) grid.innerHTML+=`<button class="input-btn" onclick="executeInput(${i})">${i}</button>`;
            } else if (currentShotIdx===1) {
                if(first===10){
                    grid.innerHTML+=`<button class="input-btn btn-strike" onclick="executeInput(10)">STRIKE ✕</button>`;
                    grid.innerHTML+=`<button class="input-btn btn-gutter" onclick="executeInput(0)">G</button>`;
                    for(let i=9;i>=1;i--) grid.innerHTML+=`<button class="input-btn" onclick="executeInput(${i})">${i}</button>`;
                } else {
                    grid.innerHTML+=`<button class="input-btn btn-spare" onclick="executeInput('spare')">SPARE /</button>`;
                    grid.innerHTML+=`<button class="input-btn btn-gutter" onclick="executeInput(0)">—</button>`;
                    for(let i=10-(first||0)-1;i>=1;i--) grid.innerHTML+=`<button class="input-btn" onclick="executeInput(${i})">${i}</button>`;
                }
            } else if (currentShotIdx===2) {
                if((first===10&&second===10)||first+(second||0)===10||second===10){
                    grid.innerHTML+=`<button class="input-btn btn-strike" onclick="executeInput(10)">STRIKE ✕</button>`;
                    grid.innerHTML+=`<button class="input-btn btn-gutter" onclick="executeInput(0)">G</button>`;
                    for(let i=9;i>=1;i--) grid.innerHTML+=`<button class="input-btn" onclick="executeInput(${i})">${i}</button>`;
                } else {
                    grid.innerHTML+=`<button class="input-btn btn-spare" onclick="executeInput('spare')">SPARE /</button>`;
                    grid.innerHTML+=`<button class="input-btn btn-gutter" onclick="executeInput(0)">—</button>`;
                    for(let i=10-(second||0)-1;i>=1;i--) grid.innerHTML+=`<button class="input-btn" onclick="executeInput(${i})">${i}</button>`;
                }
            }
        }
        if(gameData[currentFrame][0]!==null) grid.innerHTML+=`<button class="input-btn delete-btn" onclick="clearFrame()">このフレームをクリア 🗑</button>`;
        grid.innerHTML+=`<button class="input-btn cancel-btn" onclick="closeModal()">キャンセル</button>`;
    }

    function executeInput(val) {
        const isStrike = (val === 10 && (currentShotIdx === 0 || (currentFrame === 10 && (gameData[10][0]===10||gameData[10][1]===10))));
        if(val==='spare'){
            if(currentFrame<10) gameData[currentFrame][1]=10-gameData[currentFrame][0];
            else{if(currentShotIdx===1)gameData[10][1]=10-gameData[10][0];if(currentShotIdx===2)gameData[10][2]=10-gameData[10][1];}
        } else {
            if(currentFrame<10&&currentShotIdx===0&&val===10){gameData[currentFrame][0]=10;gameData[currentFrame][1]=0;}
            else gameData[currentFrame][currentShotIdx]=val;
        }
        closeModal();
        saveData();
        calculateScore();

        // アニメーション
        if (isStrike) triggerStrikeAnimation();
        else if (val === 'spare' || (val !== null && currentShotIdx > 0)) {
            const prevFirst = currentFrame < 10 ? gameData[currentFrame][0] : gameData[10][0];
            if (val === 'spare') triggerSpareAnimation();
        }

        // 自動フォーカス（次のフレームへ）
        setTimeout(() => autoFocusNextFrame(), 300);
    }

    function clearFrame() { gameData[currentFrame]=[null,null,null]; closeModal(); saveData(); calculateScore(); }

    // ===== 自動フォーカス =====
    function autoFocusNextFrame() {
        for (let f=1;f<=9;f++) {
            if(gameData[f][0]===null||(gameData[f][0]!==10&&gameData[f][1]===null)){
                openInputModal(f); return;
            }
        }
        if(gameData[10][0]===null||(gameData[10][1]===null)||(gameData[10][2]===null&&(gameData[10][0]===10||gameData[10][0]+gameData[10][1]===10))){
            openInputModal(10);
        }
    }

    // ===== アニメーション =====
    function triggerStrikeAnimation() {
        const el = document.createElement('div');
        el.className = 'strike-flash';
        el.textContent = '🎳✨';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
        spawnConfetti(20, ['#ff3b30','#ff9500','#34c759','#007af4','#af52de']);
    }
    function triggerSpareAnimation() {
        const el = document.createElement('div');
        el.className = 'strike-flash';
        el.textContent = '👏/';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 700);
        spawnConfetti(8, ['#007af4','#34c759']);
    }
    function spawnConfetti(count, colors) {
        const container = document.createElement('div');
        container.className = 'celebration';
        document.body.appendChild(container);
        for (let i=0;i<count;i++) {
            const c = document.createElement('div');
            c.className='confetti';
            c.style.left = Math.random()*100+'vw';
            c.style.top = '-10px';
            c.style.background = colors[Math.floor(Math.random()*colors.length)];
            c.style.animationDuration = (0.8+Math.random()*1.2)+'s';
            c.style.animationDelay = (Math.random()*0.4)+'s';
            container.appendChild(c);
        }
        setTimeout(()=>container.remove(), 2000);
    }
</script>
</body>
</html>
